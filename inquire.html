<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Inquiry | JC Metrics</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="inquiry-page">

  <!-- Navigation -->
  <header>
    <nav class="navbar">
      <div class="logo">
        <a href="index.html">
          <img src="assets/images/logo.png" alt="JC Metrics Logo" class="logo-img">
        </a>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html" class="active">Services</a></li>
        <li><a href="reports.html">Reports</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button class="menu-toggle">☰</button>
    </nav>
  </header>

  <main>
    <!-- Hero -->
    <section class="hero light-blue-hero">
      <div class="hero-content">
        <h1>Start a Project</h1>
        <p>Tell me about your project and I'll get back to you within 24 hours.</p>
      </div>
    </section>

    <!-- Inquiry Form -->
    <section class="intro">
      <form action="https://formspree.io/f/your-form-id" method="POST" class="contact-form">

        <label for="service">Service you're interested in</label>
        <select id="service" name="service" required>
          <option value="">— Please select —</option>
          <option value="Foundations">Foundations — From $400</option>
          <option value="Insights">Insights — From $1,200</option>
          <option value="Analytics">Analytics — From $3,000</option>
          <option value="Ongoing Partnership">Ongoing Partnership — From $1,000/month</option>
          <option value="Add-ons / Custom Work">Add-ons / Custom Work</option>
          <option value="Not sure yet">Not sure yet — let's talk</option>
        </select>

        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="_replyto" required>

        <label for="message">Tell me about your project</label>
        <textarea id="message" name="message" rows="6" placeholder="What are you working on? What questions do you need answered? Any deadlines or budget constraints?" required></textarea>

        <button type="submit" class="btn">Send Inquiry</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Julian L. Costa | jcmetrics.com</p>
  </footer>

  <script>
    // Autofill service from URL parameter, if present
    const params = new URLSearchParams(window.location.search);
    const serviceParam = params.get("service");
    if (serviceParam) {
      const select = document.getElementById("service");
      // Try to match by value first, then by partial match
      const option = Array.from(select.options).find(opt => 
        opt.value === serviceParam || 
        opt.text.includes(serviceParam)
      );
      if (option) {
        option.selected = true;
      }
    }
  </script>
</body>
</html>
